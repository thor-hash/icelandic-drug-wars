<!DOCTYPE html>
<html lang="is">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Krónan Brennur — Drug Wars: Ísland</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&display=swap');
:root {
  --green: #33ff33;
  --amber: #ffb000;
  --red: #ff3333;
  --cyan: #33ffff;
  --magenta: #ff33ff;
  --dim: #338833;
  --bg: #0a0a0a;
  --panel: #111;
  --border: #222;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%; overflow:hidden;
  background:var(--bg); color:var(--green);
  font-family:'VT323', monospace; font-size:18px;
  user-select:none; -webkit-user-select:none;
}
#game {
  width:100%; height:100vh; height:100dvh;
  display:flex; flex-direction:column;
  max-width:600px; margin:0 auto;
  position:relative;
}
#game::after {
  content:''; position:absolute; inset:0; pointer-events:none;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,0.15) 0px,rgba(0,0,0,0.15) 1px,transparent 1px,transparent 3px);
  z-index:100;
}
.header {
  background:var(--panel); border-bottom:1px solid var(--border);
  padding:8px 12px; flex-shrink:0;
}
.header-title {
  font-family:'Press Start 2P',monospace; font-size:10px;
  color:var(--amber); text-align:center; margin-bottom:6px;
  text-shadow:0 0 10px rgba(255,176,0,0.5);
}
.header-stats {
  display:grid; grid-template-columns:1fr 1fr; gap:2px 12px;
  font-size:15px; color:var(--green);
}
.header-stats .label { color:var(--dim); }
.header-stats .val-cash { color:var(--amber); }
.header-stats .val-debt { color:var(--red); }
.content {
  flex:1; overflow-y:auto; padding:8px 12px;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:thin; scrollbar-color:var(--dim) var(--bg);
}
.content::-webkit-scrollbar { width:4px; }
.content::-webkit-scrollbar-track { background:var(--bg); }
.content::-webkit-scrollbar-thumb { background:var(--dim); border-radius:2px; }
.section-title {
  color:var(--cyan); font-size:16px; margin:8px 0 4px;
  border-bottom:1px solid #1a3a3a; padding-bottom:2px;
}
.event-box {
  background:#1a1a00; border:1px solid #333300;
  padding:6px 8px; margin:6px 0; border-radius:4px;
  color:var(--amber); font-size:16px; line-height:1.4;
}
.event-box.bad { background:#1a0000; border-color:#330000; color:var(--red); }
.event-box.good { background:#001a00; border-color:#003300; color:var(--green); }
.price-table { width:100%; border-collapse:collapse; margin:4px 0; }
.price-table th { color:var(--cyan); text-align:left; font-weight:normal; font-size:14px; padding:2px 6px; border-bottom:1px solid var(--border); }
.price-table td { padding:3px 6px; font-size:16px; border-bottom:1px solid #111; }
.price-table .drug-name { color:var(--green); }
.price-table .price { color:var(--amber); text-align:right; }
.price-table .inv { color:var(--dim); text-align:right; }
.price-table tr:hover td { background:#0a1a0a; }
.actions {
  padding:8px 12px; border-top:1px solid var(--border);
  background:var(--panel); flex-shrink:0;
}
.btn-row { display:flex; gap:6px; flex-wrap:wrap; }
.btn {
  flex:1; min-width:70px; padding:10px 6px;
  background:#0a1a0a; border:1px solid var(--dim);
  color:var(--green); font-family:'VT323',monospace; font-size:17px;
  cursor:pointer; border-radius:4px; text-align:center;
  transition:all 0.15s; touch-action:manipulation;
}
.btn:active { background:var(--green); color:var(--bg); transform:scale(0.96); }
.btn.travel { border-color:var(--cyan); color:var(--cyan); }
.btn.travel:active { background:var(--cyan); color:var(--bg); }
.btn.sell { border-color:var(--amber); color:var(--amber); }
.btn.sell:active { background:var(--amber); color:var(--bg); }
.btn.danger { border-color:var(--red); color:var(--red); }
.btn.danger:active { background:var(--red); color:var(--bg); }
.btn.magenta { border-color:var(--magenta); color:var(--magenta); }
.btn.magenta:active { background:var(--magenta); color:var(--bg); }
.btn.big { padding:14px; font-size:20px; min-width:100%; }
.btn:disabled { opacity:0.3; pointer-events:none; }
.qty-section { display:flex; flex-direction:column; gap:6px; margin:6px 0; }
.qty-row { display:flex; align-items:center; gap:8px; }
.qty-input {
  background:#0a1a0a; border:1px solid var(--dim); color:var(--green);
  font-family:'VT323',monospace; font-size:20px;
  padding:8px; border-radius:4px; width:100px; text-align:center;
  -moz-appearance:textfield;
}
.qty-input::-webkit-inner-spin-button { -webkit-appearance:none; }
.qty-info { color:var(--dim); font-size:15px; }
.title-screen {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; text-align:center; gap:16px;
  padding:2rem; height:100%; overflow-y:auto;
}
.title-ascii {
  font-family:'Press Start 2P',monospace; font-size:9px;
  color:var(--green); line-height:1.3;
  text-shadow:0 0 15px rgba(51,255,51,0.3);
  white-space:pre;
}
.title-sub {
  font-size:22px; color:var(--amber);
  text-shadow:0 0 10px rgba(255,176,0,0.3);
}
.title-desc { font-size:16px; color:var(--dim); max-width:360px; line-height:1.4; }
.title-towns { font-size:14px; color:var(--cyan); line-height:1.6; }
.end-title { font-family:'Press Start 2P',monospace; font-size:14px; margin-bottom:8px; }
.end-score { font-size:28px; color:var(--amber); margin:8px 0; }
.town-btn {
  display:block; width:100%; padding:10px 12px; margin:4px 0;
  background:#0a1a1a; border:1px solid #1a3a3a;
  color:var(--cyan); font-family:'VT323',monospace; font-size:17px;
  cursor:pointer; border-radius:4px; text-align:left;
  transition:all 0.15s; touch-action:manipulation;
}
.town-btn:active { background:var(--cyan); color:var(--bg); }
.town-btn .town-desc { color:var(--dim); font-size:14px; }
.location-flavor { color:var(--dim); font-size:14px; font-style:italic; margin:2px 0 6px; line-height:1.3; }
.heat-bar { display:flex; align-items:center; gap:6px; margin:2px 0; }
.heat-bar .bar-bg { flex:1; height:8px; background:#1a0a0a; border:1px solid #330000; border-radius:3px; overflow:hidden; }
.heat-bar .bar-fill { height:100%; background:var(--red); transition:width 0.3s; }
.heat-label { color:var(--red); font-size:13px; min-width:50px; }
</style>
</head>
<body>
<div id="game"></div>
<script>
// ============================================================
//  KRÓNAN BRENNUR — Drug Wars: Ísland  (v3.5)
//  "30 dagar til að borga lánshákarlinn áður en eldgosið eyðileggur allt"
// ============================================================

const TOTAL_DAYS = 30;
const START_CASH = 250000;
const START_DEBT = 650000;
const START_SPACE = 100;

// Progressive interest — pressure eykst eftir því sem líður á leikinn
function getInterestRate(day) {
  if(day <= 10) return 0.08;   // Early: svigrúm
  if(day <= 20) return 0.12;   // Mid: optimization
  return 0.15;                  // Late: survival panic
}

const LOCATIONS = [
  { id:'reykjavik', name:'Reykjavík', desc:'Höfuðborgin — dýrt, ferðamenn, lögregla.', heatDecay:3, mult:1.0, hasBank:true, hasStash:true },
  { id:'vestmannaeyjar', name:'Vestmannaeyjar', desc:'Eyjabær — ferja, oft seinkun.', heatDecay:7, mult:1.1 },
  { id:'hveragerdi', name:'Hveragerði', desc:'Jarðhitabærinn — góð deals á náttúrulegum vörum.', heatDecay:6, mult:0.85 },
  { id:'keflavik', name:'Keflavík', desc:'Flugvöllurinn — innflutningur, hæst verð.', heatDecay:4, mult:1.25 },
  { id:'seydisfjordur', name:'Seyðisfjörður', desc:'Einangrað — ódýrast en hættulegt. Snjóflóð.', heatDecay:8, mult:0.75 },
  { id:'akureyri', name:'Akureyri', desc:'Norðurlandshöfuðborg — stöðugur markaður.', heatDecay:6, mult:0.95, hasBank:true },
  { id:'isafjordur', name:'Ísafjörður', desc:'Vestfirðir — dýrt en örugt.', heatDecay:10, mult:1.15 },
];

// Icelandic drug names + display
const DRUGS = [
  { id:'kok', name:'Kók', eng:'Cocaine', emoji:'❄️' },
  { id:'smakk', name:'MDMA', eng:'Ecstasy', emoji:'💜' },
  { id:'syra', name:'Sýra', eng:'LSD', emoji:'🌈' },
  { id:'amf', name:'Amf', eng:'Speed', emoji:'⚡' },
  { id:'gras', name:'Gras', eng:'Weed', emoji:'🌿' },
  { id:'lud', name:'Sveppir', eng:'Mushrooms', emoji:'🍄' },
];

const DRUG_IDS = DRUGS.map(d => d.id);

// Base prices per drug — PRD v3.5 formula: price = base × locMult × eventMod × random(0.8, 1.2)
const BASE_PRICES = {
  kok:   { base:15000, min:8000, max:25000 },
  smakk: { base:13000, min:7000, max:20000 },
  syra:  { base:5000,  min:2500, max:8000 },
  amf:   { base:3000,  min:1500, max:5000 },
  gras:  { base:2000,  min:800,  max:3500 },
  lud:   { base:2800,  min:1200, max:4500 },
};

// Weapons
const WEAPONS = [
  { id:'none', name:'Ekkert', price:0, defense:0 },
  { id:'knife', name:'Hnífur', price:0, defense:0.15 },
  { id:'pistol', name:'Byssa', price:80000, defense:0.40 },
  { id:'rifle', name:'Riffill', price:250000, defense:0.70 },
];

const COATS = [
  { id:'basic', name:'Basic Trenchcoat', space:100, price:0 },
  { id:'medium', name:'Stór Trenchcoat', space:150, price:120000 },
  { id:'large', name:'Duffel Bag', space:200, price:300000 },
];

const LOCATION_FLAVOR = {
  reykjavik: [
    'Laugavegur þéttsetinn ferðamönnum og skuggalegum viðskiptum.',
    'Rigning drífa yfir Hallgrímskirkju.',
    'Lykt af pylsum blandast einhverju ólöglegu.',
    'Kaldur vindur blæs niður af Esju.',
    'Ferðamaður í Canada Goose jakka er að spyrja um "local experience".',
  ],
  vestmannaeyjar: [
    'Ferjuhornið bergmálar yfir höfnina.',
    'Lundinn horfir á þig af klettanum. Hann veit.',
    'Eldfell gnæfir yfir — minnisvarði frá 1973.',
    'Sjómenn losa aflann. Og kannski meira.',
    'Vindur hvínir — ferjan er seinkuð aftur.',
  ],
  hveragerdi: [
    'Gufa rís úr heitum lindum. Gott cover.',
    'Gróðurhúsin ljóma í myrkrinu — hvað ræktar þú eiginlega?',
    'Jarðskjálftasetrið hristist þegar þú kemur í bæinn.',
    'Áin rennur heit. Viðskiptin líka.',
    'Lyktin af brennisteini blandar fersku Grasi.',
  ],
  keflavik: [
    'Flugvélar þjóta yfir. Innflutningur eða útflutningur?',
    'Tax-free mannfjöldinn gefur gott skjól.',
    'Gamlar NATO-bækistöðvar — leyndarmál búa hér.',
    'Alþjóðleg tengsl = alþjóðleg framboð.',
    'Ferðamenn á leiðinni heim — síðasta tækifærið til að selja.',
  ],
  seydisfjordur: [
    'Smyril Line ferjan situr rólega í firðinum.',
    'Litríkir húsir fela litríkar leyndarmál.',
    'Löng keyrsla hingað. En það borgar sig.',
    'Austurlandið er villt. Markaðurinn líka.',
    'Snjóstormur liggur í loftinu — passaðu þig.',
  ],
  akureyri: [
    'Norðurlandshöfuðborg — langt frá Reykjavíkurlöggu.',
    'Lystigarðurinn fælir meira en blóm.',
    'Snjóþaktar fjallstindar og stöðug eftirspurn.',
    'Sundlaugarsögusögn er betri en fréttirnar.',
    'Hér þekkist fólk — vertu varkár.',
  ],
  isafjordur: [
    'Vestfirðir finnast eins og annar heimur.',
    'Enginn kemur hingað nema hann verði. Eða vilji fela sig.',
    'Vindurinn öskrar. Gott — þekur sporin þín.',
    'Einangrun hefur sína kosti. Verðin eru einn þeirra.',
    'Skammdegið er komið — enginn sér hvað þú ert að gera.',
  ],
};

// === STATE ===
let state = {};
let snowstormActive = false; // costs extra day

function newGame() {
  state = {
    day: 1,
    cash: START_CASH,
    debt: START_DEBT,
    bank: 0,
    location: 'reykjavik',
    inventory: {},
    stash: {},
    prices: {},
    gameOver: false,
    phase: 'title',
    eventMsg: null,
    selectedDrug: null,
    heat: 0,
    coatLevel: 0,
    weapon: 'knife',
    interestPaid: 0,
    ferryDelay: false,
  };
  DRUG_IDS.forEach(d => { state.inventory[d] = 0; state.stash[d] = 0; });
  snowstormActive = false;
  generatePrices();
}

function getDrug(id) { return DRUGS.find(d => d.id === id); }
function getSpacesUsed() { return DRUG_IDS.reduce((a,d) => a + state.inventory[d], 0); }
function getMaxSpace() { return COATS[state.coatLevel].space; }
function getWeaponDef() { return WEAPONS.find(w => w.id === state.weapon) || WEAPONS[0]; }
function fmtISK(n) { return Math.round(n).toLocaleString('is-IS') + ' kr'; }
function randInt(a,b) { return Math.floor(Math.random()*(b-a+1))+a; }
function pick(arr) { return arr[Math.floor(Math.random()*arr.length)]; }

function generatePrices(eventMod) {
  const p = {};
  const loc = LOCATIONS.find(l => l.id === state.location);
  const locMult = loc ? loc.mult : 1.0;
  const eMod = eventMod || {};
  DRUG_IDS.forEach(d => {
    const bp = BASE_PRICES[d];
    const randomFactor = 0.8 + Math.random() * 0.4; // 0.8–1.2
    const evMod = eMod[d] || 1.0;
    let price = Math.round(bp.base * locMult * evMod * randomFactor);
    price = Math.max(bp.min, Math.min(bp.max, price));
    p[d] = price;
  });
  state.prices = p;
}

function addHeat(n) { state.heat = Math.min(100, state.heat + n); }
function decayHeat() {
  const loc = LOCATIONS.find(l => l.id === state.location);
  state.heat = Math.max(0, state.heat - (loc ? loc.heatDecay : 5));
}

function applyInterest() {
  if(state.debt > 0) {
    const rate = getInterestRate(state.day);
    const interest = Math.round(state.debt * rate);
    state.debt += interest;
    state.interestPaid += interest;
    return interest;
  }
  return 0;
}

// === EVENTS ===
function rollAndProcessEvent() {
  // PRD v3.5: Quadratic heat scaling
  const riskMult = 1 + (state.heat / 100) ** 2;
  const sharkActive = state.day >= 20 && state.debt > 2000000;
  const wep = getWeaponDef();

  // PRD v3.5: Event probability scales with day
  const baseEventChance = 0.25 + (state.day / 30) * 0.15; // 25% dag 1 → 40% dag 30
  if(Math.random() > baseEventChance) { state.eventMsg = null; return false; }

  // Weighted event table — Global / Local / Personal
  const events = [
    // Global events
    { type:'eldgos', w:0.06 },
    { type:'kronan', w:0.04 },
    { type:'ferdamenn', w:0.08 },
    { type:'jardhiti', w: state.location==='hveragerdi' ? 0.10 : 0.06 },
    { type:'facebook', w:0.05 },
    { type:'tollur', w:0.04 },
    // Local events
    { type:'snjostormur', w:0.05 },
    { type:'ferja', w: (state.location==='vestmannaeyjar'||state.location==='seydisfjordur') ? 0.08 : 0.02 },
    { type:'razzia', w:0.06*riskMult },
    { type:'bust_full', w:0.02*riskMult },
    // Personal events
    { type:'drukkinn', w:0.06*riskMult },
    { type:'bjarni', w: sharkActive ? 0.15 : 0 },
    { type:'bad_batch', w:0.04 },
    { type:'find', w:0.05 },
    { type:'vinur_svikur', w:0.03 },
    { type:'logmadur', w:0.03 },
    { type:'fjarfestir', w:0.02 },
  ];

  const totalW = events.reduce((a, e) => a + e.w, 0);
  const r = Math.random() * totalW;
  let cum = 0;
  let chosen = null;
  for(const e of events) {
    cum += e.w;
    if(r < cum) { chosen = e.type; break; }
  }
  if(!chosen) { state.eventMsg = null; return false; }

  // Process each event type
  if(chosen === 'eldgos') {
    // Volcano: import prices spike
    ['kok','smakk'].forEach(d => {
      state.prices[d] = Math.round(state.prices[d] * (2 + Math.random()));
    });
    state.eventMsg = { msg:'🌋 ELDGOS Í REYKJANESI! Innflutningur stöðvast — Kók og MDMA verð rokkar!', cls:'bad' };
    return false;
  }
  if(chosen === 'snjostormur') {
    snowstormActive = true;
    state.eventMsg = { msg:'🌨️ SNJÓSTORMUR! Næsta ferð kostar 2 daga í staðinn fyrir 1!', cls:'bad' };
    return false;
  }
  if(chosen === 'ferja') {
    // Lose 1 day stuck
    state.day++;
    if(state.day > TOTAL_DAYS) {
      state.phase = 'end'; state.endReason = 'time';
      state.eventMsg = { msg:'⛴️ Ferjan seinkuð — þú misstir síðasta daginn!', cls:'bad' };
      return true;
    }
    state.eventMsg = { msg:'⛴️ Ferjan er aflýst! Þú festist hér í dag — misstir 1 dag.', cls:'bad' };
    return false;
  }
  if(chosen === 'razzia') {
    if(Math.random() < wep.defense * 0.7) {
      state.eventMsg = { msg:`🚔 Lögreglan reyndi razziu... en þú slappst undan!`, cls:'good' };
      addHeat(10);
      return false;
    }
    const carried = DRUG_IDS.filter(d => state.inventory[d] > 0);
    if(carried.length > 0) {
      const d = pick(carried);
      const lost = Math.ceil(state.inventory[d] * (0.3 + Math.random()*0.5));
      state.inventory[d] = Math.max(0, state.inventory[d] - lost);
      state.eventMsg = { msg:`🚔 LÖGREGLU RAZZIA! Þú misstir ${lost} ${getDrug(d).name}!`, cls:'bad' };
    } else {
      state.eventMsg = { msg:'🚔 Lögreglan stöðvaði þig... en þú áttir ekkert á þér. Slapp!', cls:'good' };
    }
    return false;
  }
  if(chosen === 'bust_full') {
    if(Math.random() < wep.defense) {
      state.eventMsg = { msg:`🚨 HANDTÖKUTILRAUN! En þú komst undan með ${wep.name}!`, cls:'good' };
      addHeat(15);
      return false;
    }
    state.eventMsg = { msg:'🚨 LÖGREGLAN GRÍPUR ÞIG! Allt týnt... Leikur búinn.', cls:'bad' };
    state.gameOver = true; state.phase = 'end'; state.endReason = 'busted';
    return true;
  }
  if(chosen === 'ferdamenn') {
    // Tourist surge: Kók & Gras spike in Rvk/Kef
    if(state.location === 'reykjavik' || state.location === 'keflavik') {
      ['kok','gras'].forEach(d => { state.prices[d] = Math.round(state.prices[d] * (1.5 + Math.random()*0.8)); });
      state.eventMsg = { msg:'🧳 FERÐAMANNASVEIFLA! Kók og Gras verð rokkar í ferðamannabænum!', cls:'bad' };
    } else {
      state.prices['gras'] = Math.round(state.prices['gras'] * (1.3 + Math.random()*0.5));
      state.eventMsg = { msg:'🧳 Ferðamenn flæða inn — Gras eftirspurn eykst!', cls:'bad' };
    }
    return false;
  }
  if(chosen === 'jardhiti') {
    state.prices['gras'] = Math.round(state.prices['gras'] * (0.3 + Math.random()*0.3));
    state.eventMsg = { msg:'♨️ Jarðhiti-deal! Gras verð lækkar — gróðurhúsin eru full!', cls:'good' };
    return false;
  }
  if(chosen === 'facebook') {
    const d = pick(DRUG_IDS);
    const disc = 0.3 + Math.random()*0.3;
    state.prices[d] = Math.round(state.prices[d] * disc);
    state.eventMsg = { msg:`📱 "Facebook-deal"! Einhver á Marketplace selur ${getDrug(d).name} á ${fmtISK(state.prices[d])}!`, cls:'good' };
    return false;
  }
  if(chosen === 'drukkinn') {
    if(Math.random() < wep.defense * 0.8) {
      state.eventMsg = { msg:`🍺 Drukkinn ferðamaður reyndi að ræna þig — en þú varðst þig!`, cls:'good' };
      return false;
    }
    const lost = Math.floor(state.cash * (0.1 + Math.random()*0.35));
    state.cash = Math.max(0, state.cash - lost);
    state.eventMsg = { msg:`🍺 Drukkinn ferðamaður rændi þig á Laugavegi! Misstir ${fmtISK(lost)}.`, cls:'bad' };
    return false;
  }
  if(chosen === 'kronan') {
    DRUG_IDS.forEach(d => { state.prices[d] = Math.round(state.prices[d] * 1.2); });
    state.eventMsg = { msg:'💸 KRÓNAN FELLUR! Allt verð hækkar um 20%!', cls:'bad' };
    return false;
  }
  if(chosen === 'bjarni') {
    if(Math.random() < wep.defense * 0.5) {
      state.eventMsg = { msg:'🦈 Menn Bjarna komu... en þú komst undan!', cls:'good' };
      return false;
    }
    const lost = Math.floor(state.cash * (0.3 + Math.random()*0.4));
    state.cash = Math.max(0, state.cash - lost);
    const drugLost = DRUG_IDS.filter(d => state.inventory[d] > 0);
    if(drugLost.length > 0) {
      const d = pick(drugLost);
      const ql = Math.ceil(state.inventory[d] * 0.3);
      state.inventory[d] = Math.max(0, state.inventory[d] - ql);
    }
    state.eventMsg = { msg:`🦈 MENN BJARNA BRÓÐUR! "Hvar er peningurinn, strákur?" Misstir ${fmtISK(lost)}!`, cls:'bad' };
    return false;
  }
  if(chosen === 'bad_batch') {
    const carried = DRUG_IDS.filter(d => state.inventory[d] > 0);
    if(carried.length > 0) {
      const d = pick(carried);
      const lost = Math.ceil(state.inventory[d] * (0.15 + Math.random()*0.3));
      state.inventory[d] = Math.max(0, state.inventory[d] - lost);
      state.eventMsg = { msg:`💀 Slæm sending! ${lost} ${getDrug(d).name} eyðilögðust.`, cls:'bad' };
    }
    return false;
  }
  if(chosen === 'find') {
    const d = pick(DRUG_IDS);
    const free = getMaxSpace() - getSpacesUsed();
    if(free <= 0) return false;
    const qty = Math.min(free, randInt(2, 10));
    state.inventory[d] += qty;
    const msgs = [
      `Þú fannst ${qty} ${getDrug(d).name} á jörðinni!`,
      `Dealer missti ${qty} ${getDrug(d).name} á flótta frá löggunni!`,
      `Nafnlaus ábending — ${qty} ${getDrug(d).name} fundust!`,
    ];
    state.eventMsg = { msg:'🎁 ' + pick(msgs), cls:'good' };
    return false;
  }
  // PRD v3.5: New events
  if(chosen === 'tollur') {
    // Customs crackdown — imported drugs (Kók, MDMA) spike
    ['kok','smakk'].forEach(d => { state.prices[d] = Math.round(state.prices[d] * 1.4); });
    state.eventMsg = { msg:'🛃 Tollurinn herðir eftirlit! Innflutt efni (Kók, MDMA) hækkar um 40%!', cls:'bad' };
    return false;
  }
  if(chosen === 'vinur_svikur') {
    // Old friend betrays — stash in Rvk shrinks 20%
    const stashed = DRUG_IDS.filter(d => state.stash[d] > 0);
    if(stashed.length > 0) {
      stashed.forEach(d => {
        const lost = Math.ceil(state.stash[d] * 0.2);
        state.stash[d] = Math.max(0, state.stash[d] - lost);
      });
      state.eventMsg = { msg:'🤝 Gamall vinur svíkur þig. Stash í Reykjavík minnkaði um 20%.', cls:'bad' };
    } else {
      state.eventMsg = { msg:'🤝 Gamall vinur reyndi að svíkja þig — en þú áttir ekkert í stash.', cls:'good' };
    }
    return false;
  }
  if(chosen === 'logmadur') {
    // Lawyer reduces heat by 30
    const reduced = Math.min(state.heat, 30);
    state.heat = Math.max(0, state.heat - 30);
    state.eventMsg = { msg:`⚖️ Lögmaður reddar þér. Heat lækkaði um ${reduced}!`, cls:'good' };
    return false;
  }
  if(chosen === 'fjarfestir') {
    // Investor offers to double cash loan — but debt increases 50%
    if(state.debt > 0) {
      const loanOffer = Math.round(state.debt * 0.5);
      state.cash += loanOffer;
      state.debt = Math.round(state.debt * 1.5);
      state.eventMsg = { msg:`💼 Fjárfestir býðst að "hjálpa" — færð ${fmtISK(loanOffer)} en skuld hækkar um 50%!`, cls:'bad' };
    } else {
      state.eventMsg = { msg:'💼 Fjárfestir sér að þú ert skuldlaus. Enginn áhugi.', cls:'good' };
    }
    return false;
  }
  state.eventMsg = null;
  return false;
}

// === RENDER ===

  if(state.phase === 'title') return renderTitle();

}

// === LOAN SHARK ===

  const rate = getInterestRate(state.day);
  const ipd = Math.round(state.debt * rate);
  const phase = state.day <= 10 ? 'Snemma (8%)' : state.day <= 20 ? 'Miðja (12%)' : 'Seint (15%)';
  const threat = state.debt > 2000000 && state.day >= 15;
  $game.innerHTML = `
    ${renderHeader()}
    <div class="content">
      <div class="section-title">🦈 Bjarni Bróðir — Lánshákarl</div>
      <div class="event-box" style="border-color:#333;">
        "Sæll strákur... skuldin þín er <span style="color:var(--red)">${fmtISK(state.debt)}</span>."<br>
        "Vextir: <span style="color:var(--amber)">${fmtISK(ipd)}</span> á dag (${Math.round(rate*100)}% — ${phase})."<br>
        ${threat ? '"<span style="color:var(--red)">Hvar er peningurinn? Krónan er að falla og ég er að missa þolinmæðina!</span>"' : '"Borgaðu þegar þú getur... eða ekki."'}
      </div>
      <div class="section-title">Borga skuld</div>
      <div class="qty-section">
        <div class="qty-row">
          <span style="color:var(--dim)">Upphæð:</span>
          <input type="number" class="qty-input" id="pay-input" value="${Math.min(state.cash, state.debt)}" min="0" max="${Math.min(state.cash, state.debt)}" inputmode="numeric">
        </div>
        <div class="btn-row">
          <button class="btn" onclick="document.getElementById('pay-input').value=${Math.min(state.cash,state.debt)}">ALLT</button>
          <button class="btn" onclick="document.getElementById('pay-input').value=${Math.min(state.cash,Math.floor(state.debt/2))}">HÁLFT</button>
        </div>
        <button class="btn sell" onclick="payDebt()">💰 Borga</button>
      </div>
      <div class="section-title">Taka lán</div>
      <div class="qty-section">
        <div class="qty-row">
          <span style="color:var(--dim)">Upphæð:</span>
          <input type="number" class="qty-input" id="loan-input" value="100000" min="0" max="1000000" inputmode="numeric">
        </div>
        <button class="btn danger" onclick="takeLoan()">🦈 Taka lán</button>
      </div>
    </div>
    <div class="actions"><div class="btn-row">
      <button class="btn danger" onclick="state.phase='market';render()">← Til baka</button>
    </div></div>`;
}

function payDebt() {
  let amt = Math.min(parseInt(document.getElementById('pay-input').value)||0, state.cash, state.debt);
  if(amt <= 0) return;
  state.cash -= amt; state.debt -= amt;
  state.phase = 'market';
  state.eventMsg = { msg:`💰 Borgaðir ${fmtISK(amt)} til Bjarna. Eftirstöðvar: ${fmtISK(state.debt)}`, cls:'good' };
  render();
}

function takeLoan() {
  let amt = Math.max(0, Math.min(parseInt(document.getElementById('loan-input').value)||0, 1000000));
  if(amt <= 0) return;
  state.cash += amt; state.debt += amt;
  state.phase = 'market';
  state.eventMsg = { msg:`🦈 Tókst ${fmtISK(amt)} lán hjá Bjarna. Skuld: ${fmtISK(state.debt)}`, cls:'bad' };
  render();
}

    ${renderHeader()}
    <div class="content">

      <div style="margin:8px 0;font-size:17px;">
        Inneign: <span style="color:var(--amber)">${fmtISK(state.bank)}</span><br>
        Cash: <span style="color:var(--green)">${fmtISK(state.cash)}</span>

      </div>

function bankAction(type) {
  if(type === 'dep') {
    let amt = Math.min(parseInt(document.getElementById('dep-input').value)||0, state.cash);
    if(amt <= 0) return;
    state.cash -= amt; state.bank += amt;
    state.eventMsg = { msg:`🏦 Lagðir ${fmtISK(amt)} inn.`, cls:'good' };
  } else {
    let amt = Math.min(parseInt(document.getElementById('wd-input').value)||0, state.bank);
    if(amt <= 0) return;
    state.bank -= amt; state.cash += amt;
    state.eventMsg = { msg:`🏦 Tókst ${fmtISK(amt)} út.`, cls:'good' };
  }
  state.phase = 'market'; render();
}

// === STASH ===
function renderStash() {
  const stashed = DRUG_IDS.filter(d => state.stash[d] > 0);
  const carried = DRUG_IDS.filter(d => state.inventory[d] > 0);
  $game.innerHTML = `
    ${renderHeader()}
    <div class="content">
      <div class="section-title">🏠 Stash (Reykjavík)</div>
      <div style="color:var(--dim);font-size:14px;margin-bottom:8px;">Geymsla sem tekur ekki pláss í trenchcoat.</div>
      ${stashed.length > 0 ? `<div style="color:var(--magenta);font-size:15px;margin:4px 0;">Í stash: ${stashed.map(d => `${getDrug(d).name}: ${state.stash[d]}`).join(' │ ')}</div>` : '<div style="color:var(--dim);">Stash tómur.</div>'}
      <div class="section-title">Geyma</div>
      ${carried.length > 0 ? carried.map(d => `
        <button class="town-btn" onclick="stashOp('store','${d}')">⬆ Geyma ${getDrug(d).name} <span class="town-desc">Á þér: ${state.inventory[d]}</span></button>
      `).join('') : '<div style="color:var(--dim);">Ekkert á þér.</div>'}
      <div class="section-title">Sækja</div>
      ${stashed.length > 0 ? stashed.map(d => `
        <button class="town-btn" onclick="stashOp('get','${d}')">⬇ Sækja ${getDrug(d).name} <span class="town-desc">Í stash: ${state.stash[d]}</span></button>
      `).join('') : '<div style="color:var(--dim);">Ekkert í stash.</div>'}
    </div>
    <div class="actions"><div class="btn-row">
      <button class="btn danger" onclick="state.phase='market';render()">← Til baka</button>
    </div></div>`;
}

function stashOp(type, drug) {
  if(type === 'store') {
    state.stash[drug] += state.inventory[drug];
    state.inventory[drug] = 0;
  } else {
    const free = getMaxSpace() - getSpacesUsed();
    const amt = Math.min(state.stash[drug], free);
    if(amt <= 0) { state.eventMsg = { msg:'Ekki pláss í trenchcoat!', cls:'bad' }; render(); return; }
    state.inventory[drug] += amt;
    state.stash[drug] -= amt;
  }
  render();
}

// === BLACK MARKET ===
function renderBlackMarket() {
  const cw = getWeaponDef();
  const cc = COATS[state.coatLevel];
  const nc = COATS[state.coatLevel + 1];
  $game.innerHTML = `
    ${renderHeader()}

      <div class="section-title">Vopn</div>
      <div style="font-size:15px;color:var(--dim);margin-bottom:4px;">Núverandi: ${cw.name} (${Math.round(cw.defense*100)}% vörn)</div>
      ${WEAPONS.filter(w => w.id !== state.weapon && w.price > 0).map(w => `
        <button class="town-btn" onclick="buyWeapon('${w.id}')" ${state.cash < w.price ? 'style="opacity:0.4"' : ''}>

        </button>`).join('')}
      <div class="section-title">Trenchcoat</div>
      <div style="font-size:15px;color:var(--dim);margin-bottom:4px;">Núverandi: ${cc.name} (${cc.space} rými)</div>
      ${nc ? `<button class="town-btn" onclick="buyCoat()" ${state.cash < nc.price ? 'style="opacity:0.4"' : ''}>
        🧥 ${nc.name} — <span style="color:var(--amber)">${fmtISK(nc.price)}</span>
        <span class="town-desc">${nc.space} rými</span></button>` : '<div style="color:var(--dim);">Max level!</div>'}
    </div>
    <div class="actions"><div class="btn-row">
      <button class="btn danger" onclick="state.phase='market';render()">← Til baka</button>
    </div></div>`;
}

function buyWeapon(id) {
  const w = WEAPONS.find(x => x.id === id);
  if(!w || state.cash < w.price) return;
  state.cash -= w.price; state.weapon = w.id; addHeat(5);
  state.eventMsg = { msg:`🔫 Keyptir ${w.name}! ${Math.round(w.defense*100)}% vörn.`, cls:'good' };
  state.phase = 'market'; render();
}

function buyCoat() {
  const nc = COATS[state.coatLevel + 1];
  if(!nc || state.cash < nc.price) return;
  state.cash -= nc.price; state.coatLevel++;
  state.eventMsg = { msg:`🧥 Uppfærðir í ${nc.name}! ${nc.space} rými.`, cls:'good' };
  state.phase = 'market'; render();
}

// === BUY / SELL ===
function renderBuySell(mode) {
  const isBuy = mode === 'buy';
  const title = isBuy ? '💰 KAUPA' : '📤 SELJA';
  const freeSpace = getMaxSpace() - getSpacesUsed();

  const drugList = DRUG_IDS.filter(d => {
    if(isBuy) return state.prices[d] <= state.cash;
    return state.inventory[d] > 0;
  });

  if(state.selectedDrug) {
    const d = state.selectedDrug;
    const dr = getDrug(d);
    const price = state.prices[d];
    const maxQty = isBuy ? Math.min(freeSpace, Math.floor(state.cash / price)) : state.inventory[d];

    $game.innerHTML = `
      ${renderHeader()}
      <div class="content">
        <div class="section-title">${title}</div>
        <div style="margin:8px 0;font-size:18px;">
          ${dr.emoji} <span style="color:var(--cyan)">${dr.name}</span> @ <span style="color:var(--amber)">${fmtISK(price)}</span>
        </div>
        <div class="qty-section">
          <div class="qty-row">
            <span style="color:var(--dim)">Magn:</span>
            <input type="number" class="qty-input" id="qty-input" value="${maxQty}" min="1" max="${maxQty}" inputmode="numeric">
            <span class="qty-info">/ ${maxQty}</span>
          </div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;">
            <button class="btn" onclick="setQty(${maxQty})" style="flex:1;min-width:55px;">MAX</button>
            <button class="btn" onclick="setQty(${Math.floor(maxQty/2)})" style="flex:1;min-width:55px;">HÁLFT</button>
            <button class="btn" onclick="setQty(${Math.floor(maxQty/4)})" style="flex:1;min-width:55px;">¼</button>
            <button class="btn" onclick="setQty(1)" style="flex:1;min-width:55px;">1</button>
          </div>
          <div id="qty-total" style="color:var(--amber);font-size:16px;">Samtals: ${fmtISK(maxQty*price)}</div>
        </div>
      </div>
      <div class="actions"><div class="btn-row">
        <button class="btn ${isBuy?'':'sell'}" onclick="confirmBuySell('${mode}','${d}')">${isBuy?'💰 KAUPA':'📤 SELJA'}</button>
        <button class="btn danger" onclick="state.selectedDrug=null;render()">✖ Hætta við</button>
      </div></div>`;
    const qi = document.getElementById('qty-input');
    const tEl = document.getElementById('qty-total');
    qi.addEventListener('input', () => {
      let v = Math.max(0, Math.min(maxQty, parseInt(qi.value)||0));
      tEl.textContent = 'Samtals: ' + fmtISK(v * price);
    });
    qi.focus(); qi.select();
    return;
  }

  $game.innerHTML = `
    ${renderHeader()}
    <div class="content">
      <div class="section-title">${title}</div>
      ${isBuy ? `<div class="qty-info">Cash: ${fmtISK(state.cash)} │ Rými: ${freeSpace}</div>` : ''}
      ${drugList.length === 0 ? `<div style="color:var(--dim);margin:12px 0;">${isBuy?'Ekki nóg cash.':'Ekkert til sölu.'}</div>` : ''}
      ${drugList.map(d => {
        const dr = getDrug(d);
        const price = state.prices[d];
        const mq = isBuy ? Math.min(freeSpace, Math.floor(state.cash/price)) : state.inventory[d];
        return `<button class="town-btn" onclick="state.selectedDrug='${d}';render()">
          ${dr.emoji} ${dr.name} — <span style="color:var(--amber)">${fmtISK(price)}</span>
          <span class="town-desc">${isBuy ? `Max: ${mq}` : `Á þér: ${state.inventory[d]}`}</span>
        </button>`;
      }).join('')}
    </div>
    <div class="actions"><div class="btn-row">
      <button class="btn danger" onclick="state.selectedDrug=null;state.phase='market';render()">← Til baka</button>
    </div></div>`;
}

function setQty(n) {
  const el = document.getElementById('qty-input');
  if(!el) return;
  el.value = Math.max(1, n);
  el.dispatchEvent(new Event('input'));
}

function confirmBuySell(mode, drug) {
  let qty = parseInt(document.getElementById('qty-input').value) || 0;
  if(qty <= 0) return;
  const price = state.prices[drug];
  if(mode === 'buy') {
    qty = Math.min(qty, getMaxSpace() - getSpacesUsed(), Math.floor(state.cash / price));
    if(qty <= 0) return;
    const total = qty * price;
    state.cash -= total;
    state.inventory[drug] += qty;
    let heatGain = Math.ceil(total / 50000);
    if(total > 200000) heatGain *= 2; // PRD v3.5: double heat for large transactions
    addHeat(heatGain);
  } else {
    qty = Math.min(qty, state.inventory[drug]);
    if(qty <= 0) return;
    const total = qty * price;
    state.cash += total;
    state.inventory[drug] -= qty;
    let heatGain = Math.ceil(total / 50000);
    if(total > 200000) heatGain *= 2; // PRD v3.5: double heat for large transactions
    addHeat(heatGain);
  }
  state.selectedDrug = null;
  state.phase = 'market';
  render();
}

function startBuy() { state.phase = 'buy'; state.selectedDrug = null; render(); }
function startSell() { state.phase = 'sell'; state.selectedDrug = null; render(); }

// === TRAVEL ===
function renderTravel() {
  const others = LOCATIONS.filter(l => l.id !== state.location);
  const dayCost = snowstormActive ? 2 : 1;
  $game.innerHTML = `
    ${renderHeader()}
    <div class="content">
      <div class="section-title">✈️ Ferðast — Dagur ${state.day}/${TOTAL_DAYS}</div>
      <div class="qty-info" style="margin:4px 0 8px;">Veldu áfangastað (kostar ${dayCost} ${dayCost>1?'daga':'dag'}):</div>
      ${snowstormActive ? '<div class="event-box bad">🌨️ Snjóstormur! Ferðir kosta 2 daga.</div>' : ''}
      ${others.map(l => `
        <button class="town-btn" onclick="travelTo('${l.id}')">
          📍 ${l.name}
          <span class="town-desc">${l.desc}</span>
        </button>`).join('')}
      <button class="town-btn" onclick="travelTo('${state.location}')" style="border-color:#333;color:var(--dim);">
        🔄 Vera í ${LOCATIONS.find(l=>l.id===state.location).name}
        <span class="town-desc">Kostar ${dayCost} dag — ný verð</span>
      </button>
    </div>
    <div class="actions"><div class="btn-row">
      <button class="btn danger" onclick="state.phase='market';render()">← Til baka</button>
    </div></div>`;
}

function travelTo(locId) {
  const dayCost = snowstormActive ? 2 : 1;
  state.day += dayCost;
  state.location = locId;
  snowstormActive = false;
  generatePrices();

  // Interest for each day traveled
  let totalInterest = 0;
  for(let i = 0; i < dayCost; i++) totalInterest += applyInterest();
  decayHeat();

  if(state.day > TOTAL_DAYS) {
    state.phase = 'end'; state.endReason = 'time'; render(); return;
  }

  const ended = rollAndProcessEvent();
  if(ended) { render(); return; }

  if(totalInterest > 0 && !state.eventMsg) {
    state.eventMsg = { msg:`📈 Vextir: +${fmtISK(totalInterest)} á skuld`, cls:'bad' };
  } else if(totalInterest > 0 && state.eventMsg) {
    state.eventMsg.msg += `<br>📈 Vextir: +${fmtISK(totalInterest)}`;
  }

  state.phase = 'market';
  saveGame(); // auto-save á hverjum degi
  render();
  const c = document.querySelector('.content');
  if(c) c.scrollTop = 0;
}

// === END SCREEN ===
function renderEnd() {
  let title, titleColor, msg, scoreText;

  deleteSave(); // clear save on game end
  if(state.endReason === 'busted') {
    title = '🚨 HANDTEKINN!';
    titleColor = 'var(--red)';
    msg = 'Lögreglan náði þér. Leikur búinn.';
    scoreText = 'Skor: 0 kr';
  } else {
    let invValue = 0;
    DRUG_IDS.forEach(d => {
      const bp = BASE_PRICES[d];
      if(state.inventory[d] > 0) {
        invValue += state.inventory[d] * Math.round(bp.base * 0.5);
      }
      if(state.stash[d] > 0) {
        invValue += state.stash[d] * Math.round(bp.base * 0.4);
      }
    });
    const total = state.cash + state.bank + invValue;
    const profit = total - state.debt;

    saveHighScore(profit);
    if(profit > 0) {
      title = '💰 ÞÚ VANNST!';
      titleColor = 'var(--green)';
      msg = `Þú borgaðir Bjarna Bróður og græddir! Ekki slæmt.`;
    } else {
      title = '💀 GAME OVER';
      titleColor = 'var(--red)';
      msg = 'Þú borgaðir ekki skuldina. Bjarni Bróðir sendi menn...';
    }
    scoreText = `
      Cash: ${fmtISK(state.cash)}<br>
      ${state.bank > 0 ? `Banki: ${fmtISK(state.bank)}<br>` : ''}
      ${invValue > 0 ? `Birgðir + stash (selt á hálfu): ${fmtISK(invValue)}<br>` : ''}
      Samtals: ${fmtISK(total)}<br>
      Skuld: -${fmtISK(state.debt)}<br>
      Vextir greiddir: ${fmtISK(state.interestPaid)}<br>
      <span style="color:${profit>=0?'var(--green)':'var(--red)'};">
        ${profit>=0?'Hagnaður':'Tap'}: ${fmtISK(Math.abs(profit))}
      </span>`;
  }

  $game.innerHTML = `
    <div class="title-screen">
      <div class="end-title" style="color:${titleColor}">${title}</div>
      <div style="font-size:18px;color:var(--dim);max-width:320px;line-height:1.4;">${msg}</div>
      <div class="end-score" style="line-height:1.8;font-size:18px;">${scoreText}</div>
      <button class="btn big" onclick="startGame()">🔄 SPILA AFTUR</button>
      ${getHighScore() > 0 ? `<div style="color:var(--amber);font-size:14px;">🏆 Hæsta skor: ${fmtISK(getHighScore())}</div>` : ''}
      <div style="color:var(--dim);font-size:12px;margin-top:8px;">Krónan Brennur v3.5 — 2026</div>
    </div>`;
}

// === SAVE / LOAD (localStorage) ===
function saveGame() {
  try {
    localStorage.setItem('kronan_save', JSON.stringify(state));
  } catch(e) {}
}

function hasSavedGame() {
  try {
    const saved = localStorage.getItem('kronan_save');
    if(!saved) return false;
    const s = JSON.parse(saved);
    return !!(s && s.day && !s.gameOver);
  } catch(e) { return false; }
}

function loadGame() {
  try {
    const saved = localStorage.getItem('kronan_save');
    if(!saved) return false;
    const s = JSON.parse(saved);
    if(!s || !s.day || s.gameOver) return false;
    state = s;
    return true;
  } catch(e) { return false; }
}

function deleteSave() {
  try { localStorage.removeItem('kronan_save'); } catch(e) {}
}

function saveHighScore(score) {
  try {
    const prev = parseInt(localStorage.getItem('kronan_highscore')) || 0;
    if(score > prev) localStorage.setItem('kronan_highscore', score);
  } catch(e) {}
}

function getHighScore() {
  try { return parseInt(localStorage.getItem('kronan_highscore')) || 0; } catch(e) { return 0; }
}

// === INIT ===
newGame();
render();
</script>
</body>
</html>
